<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Spinner</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0ece4;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }

    #hud {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 10;
    }

    #mode-indicator {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.5);
      transition: color 0.3s;
    }

    #speed-indicator {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: rgba(0,0,0,0.35);
    }

    #connect-btn {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: none;
      border: 1.5px solid rgba(0,0,0,0.2);
      color: rgba(0,0,0,0.5);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 10px 28px;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 10;
      border-radius: 4px;
    }
    #connect-btn:hover {
      border-color: rgba(0,0,0,0.5);
      color: rgba(0,0,0,0.8);
    }
    #connect-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    #status {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: rgba(0,0,0,0.3);
      z-index: 10;
    }
    #status.connected { color: rgba(0,140,60,0.7); }

    #color-strip {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      align-items: center;
    }
    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      opacity: 0.35;
      transition: opacity 0.2s, transform 0.2s;
      border: 1.5px solid rgba(0,0,0,0.15);
    }
    .swatch.active {
      opacity: 1;
      transform: scale(1.5);
      border-color: rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
  <div id="mode-indicator">Mode 1 — Spin Control</div>
  <div id="speed-indicator">speed: 0.00</div>
</div>

<div id="color-strip"></div>

<button id="connect-btn">Connect to ESP32</button>
<div id="status">not connected</div>

<!-- 3js for the cat 3d render -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const MODEL_FILE = 'cat.glb';

const BG_COLORS = [
  '#f0ece4',
  '#d6e8f5',
  '#e8d6f5',
  '#d6f5e3',
  '#f5d6d6',
  '#f5ecd6',
];

//setup the cat music
const music = new Audio('music.mp3');
music.loop = true;
music.volume = 0.5;


let mode = 1; //1 = speed spin control, 2 = color bg control
let spinSpeed = 0; 
let spinning = false;
let colorIndex = 0;

const BASE_SPEED = 0.005;
const MAX_SPEED = 1.5;
const SPEED_STEP = 0.001;

let t2held = false;
let t3held = false;
let t2heldAt = 0;
let t3heldAt = 0;
const HOLD_TIMEOUT = 1000;

let lastModeSwitch = 0;
const MODE_COOLDOWN = 800; //prevents double switching
let pad1TouchedAt = 0; 
const MAX_TAP_DURATION = 600; // prevents ghost taps

// 3d model 3js
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(BG_COLORS[0]);
document.body.style.background = BG_COLORS[0];

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 4);
camera.lookAt(0, 0.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

// making it look nice
const ambient = new THREE.AmbientLight(0xffffff, 4.0);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 4.0);
dirLight.position.set(3, 5, 3);
dirLight.castShadow = true;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 3.0);
fillLight.position.set(-3, 2, -3);
scene.add(fillLight);

//adding the  3d cat model
let catModel = null;
const loader = new GLTFLoader();
loader.load(
  MODEL_FILE,
  (gltf) => {
    catModel = gltf.scene;

    const box = new THREE.Box3().setFromObject(catModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = (2.0 / maxDim) * 1.5;
    catModel.scale.setScalar(scale);
    catModel.position.sub(center.multiplyScalar(scale));
    catModel.position.y += size.y * scale * 0.5;

    catModel.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    scene.add(catModel);
    console.log('Cat model loaded!');
  },
  undefined,
  (err) => console.error('Failed to load model:', err)
);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const modeEl = document.getElementById('mode-indicator');
const speedEl = document.getElementById('speed-indicator');
const colorStrip = document.getElementById('color-strip');

//color bgs
BG_COLORS.forEach((c, i) => {
  const s = document.createElement('div');
  s.className = 'swatch' + (i === 0 ? ' active' : '');
  s.style.background = c === '#0a0a0a' ? '#444' : c;
  colorStrip.appendChild(s);
});

function updateSwatches() {
  document.querySelectorAll('.swatch').forEach((s, i) => {
    s.classList.toggle('active', i === colorIndex);
  });
}

function setMode(m) {
  mode = m;
  t2held = false;
  t3held = false;
  pad1TouchedAt = 0;
  if (mode === 1) {
    modeEl.textContent = 'Mode 1 — Speed Spinning Control';
  } else {
    modeEl.textContent = 'Mode 2 — Color Background Control';
  }
}

function updateBg() {
  scene.background = new THREE.Color(BG_COLORS[colorIndex]);
  document.body.style.background = BG_COLORS[colorIndex];
  updateSwatches();
}

function onTouch(pad) {
  // pad 1 = mode toggle (handled on release)
  // pad 2 = decrease speed (mode 1) / cycle colors backward (mode 2)
  // pad 3 = increase speed (mode 1) / cycle colors forward (mode 2)
  if (pad === 1) {
    pad1TouchedAt = Date.now(); //get time so we can check duration
    return;
  }

  if (mode === 1) {
    if (pad === 2) {
      t2held = true;
      t2heldAt = Date.now();
    }
    if (pad === 3) {
      t3held = true;
      t3heldAt = Date.now();
    }
  } else {
    if (pad === 2) {
      colorIndex = (colorIndex - 1 + BG_COLORS.length) % BG_COLORS.length;
      updateBg();
    }
    if (pad === 3) {
      colorIndex = (colorIndex + 1) % BG_COLORS.length;
      updateBg();
    }
  }
}

function onRelease(pad) {
  if (pad === 2) t2held = false;
  if (pad === 3) t3held = false;

  if (pad === 1) {
    const now = Date.now();

    if (pad1TouchedAt < lastModeSwitch + MODE_COOLDOWN) {
      console.log('cooldownwindow');
      pad1TouchedAt = 0;
      return;
    }

    if (now - pad1TouchedAt > MAX_TAP_DURATION) {
      console.log('tap too long');
      pad1TouchedAt = 0;
      return;
    }

    if (pad1TouchedAt === 0) {
      console.log('no touch');
      return;
    }

    lastModeSwitch = now;
    pad1TouchedAt = 0;
    setMode(mode === 1 ? 2 : 1);
  }
}

function animate() {
  requestAnimationFrame(animate);

  if (mode === 1) {
    if (t2held && Date.now() - t2heldAt > HOLD_TIMEOUT) t2held = false;
    if (t3held && Date.now() - t3heldAt > HOLD_TIMEOUT) t3held = false;

    if (t3held) {
      spinSpeed = Math.min(spinSpeed + SPEED_STEP, MAX_SPEED);
    }
    if (t2held) {
      spinSpeed = Math.max(spinSpeed - SPEED_STEP, 0);
    }
  }

  spinning = spinSpeed > 0;
  if (catModel && spinning) {
    catModel.rotation.y += spinSpeed;
  }

  speedEl.textContent = `speed: ${spinSpeed.toFixed(3)}`;
  renderer.render(scene, camera);
}
animate();

const connectBtn = document.getElementById('connect-btn');
const statusEl = document.getElementById('status');

connectBtn.addEventListener('click', async () => {
  try {
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    statusEl.textContent = 'connected';
    statusEl.className = 'connected';
    connectBtn.disabled = true;
    readSerial(port);
    music.play();
  } catch (err) {
    statusEl.textContent = 'connection failed';
    console.error(err);
  }
});

async function readSerial(port) {
  const decoder = new TextDecoderStream();
  port.readable.pipeTo(decoder.writable);
  const reader = decoder.readable.getReader();
  let buffer = '';

  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += value;
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        parseLine(line.trim());
      }
    }
  } catch (err) {
    console.error('Serial read error:', err);
    statusEl.textContent = 'disconnected';
    statusEl.className = '';
  }
}

function parseLine(line) {
  if (!line) return;
  line = line.replace(/\r/g, '').trim();
  if (line.startsWith('TOUCH:')) {
    const pad = parseInt(line.split(':')[1].trim());
    console.log(`TOUCH pad=${pad} | mode=${mode} | t2held=${t2held} | t3held=${t3held} | speed=${spinSpeed.toFixed(3)} | pad1TouchedAt=${pad1TouchedAt}`);
    onTouch(pad);
  } else if (line.startsWith('RELEASE:')) {
    const pad = parseInt(line.split(':')[1].trim());
    console.log(`RELEASE pad=${pad} | mode=${mode} | t2held=${t2held} | t3held=${t3held} | speed=${spinSpeed.toFixed(3)} | pad1TouchedAt=${pad1TouchedAt}`);
    onRelease(pad);
  } else {
    console.log('SYS:', line);
  }
}
</script>
</body>
</html>
